name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against solutions
        run: |
          # Подменяем tasks.py на solution.py в каждом модуле перед запуском тестов
          for dir in modules/*/; do
            if [ -f "$dir/solution.py" ] && [ -f "$dir/tasks.py" ]; then
              cp "$dir/tasks.py" "$dir/tasks.py.bak"
              cp "$dir/solution.py" "$dir/tasks.py"
            fi
          done

          python -m pytest modules/ -v --tb=short

          # Восстанавливаем оригинальные tasks.py
          for dir in modules/*/; do
            if [ -f "$dir/tasks.py.bak" ]; then
              mv "$dir/tasks.py.bak" "$dir/tasks.py"
            fi
          done